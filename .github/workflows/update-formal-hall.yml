name: Update Formal Hall Menus

on:
  schedule:
    - cron: '0 12 * * 0' # Every Sunday at midday UTC
  workflow_dispatch: {} # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: node scripts/updateFormalHall.mjs
      - name: Commit and push if changed
        run: |
          git diff --quiet src/data/formalHallData.json && echo "No changes" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/formalHallData.json
          git commit -m "Update formal hall menus"
          git push
